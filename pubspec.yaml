name: tripnotesapp
description: "Trip notes app logs"
publish_to: 'none'

version: 0.8.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  intl_phone_field: ^3.2.0
  pinput: ^6.0.2
  google_fonts: ^8.0.2
  google_maps_flutter: ^2.10.0
  location: ^8.0.1
  dio: ^5.7.0
  geolocator: ^14.0.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  geocoding: ^4.0.0
  image_picker: ^1.1.2
  flutter_contacts: ^2.0.1
  in_app_update_me: ^1.0.1
  http: ^1.2.0
  package_info_plus: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
