name: Build and Release APK

on:
  push:
    tags:
      - 'v*'  # Trigger on tags starting with 'v' (e.g., v1.0.0, v1.2.3)

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    name: Build and Release APK
    runs-on: ubuntu-latest
    
    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # Cache Flutter dependencies
      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Get Flutter dependencies
      - name: Get Flutter dependencies
        run: flutter pub get

      # Decode Keystore from GitHub Secrets
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # Build Signed APK
      - name: Build Signed APK
        run: flutter build apk --release
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Generate SHA256 Checksum
      - name: Generate Checksum
        run: |
          cd build/app/outputs/flutter-apk
          sha256sum app-release.apk > checksums.txt

      # Get version from tag or input
      - name: Get Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # Create Release and Upload Assets using softprops/action-gh-release@v2
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            🚀 Trip Notes App ${{ steps.get_version.outputs.VERSION }}
            
            ## What's New
            - Auto-generated release from GitHub Actions
            
            ## Installation
            1. Download the APK file below
            2. Install on your Android device
            3. The app will automatically detect updates on next launch
            
            ## Checksums
            See attached files for SHA256 checksums.
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/checksums.txt
          draft: false
          prerelease: false

      # Cleanup Keystore (security)
      - name: Cleanup Keystore
        if: always()
        run: |
          rm -f android/app/keystore.jks

      # Notify success
      - name: Notify Success
        if: success()
        run: |
          echo "✅ Build and release completed successfully!"
          echo "📦 Version: ${{ steps.get_version.outputs.VERSION }}"

  # Optional: Build for different architectures
  build-split-apk:
    name: Build Split APKs
    runs-on: ubuntu-latest
    needs: build-and-release
    if: false  # Set to true if you want split APKs
    
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86_64]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - run: flutter pub get
      
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
      
      - name: Build APK for ${{ matrix.abi }}
        run: |
          flutter build apk --release --split-per-abi --target-platform android-${{ matrix.abi }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      
      - name: Cleanup Keystore
        if: always()
        run: rm -f android/app/keystore.jks